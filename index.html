</script>
<style>
  :root {
    --navy: #051C2C;
    --navy-light: #0A2E4A;
    --mck-blue: #2251FF;
    --accent: #00A9CE;
    --accent-muted: rgba(0,169,206,0.12);
    --white: #FFFFFF;
    --gray-50: #F7F8F9;
    --gray-100: #E8EAED;
    --gray-300: #B0B8C1;
    --gray-600: #5C6670;
    --gray-800: #2D3439;
    --font: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    --max-w: 1200px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--gray-50);
    color: var(--gray-800);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  /* Header — McKinsey-style top bar */
  .site-header {
    background: var(--white);
    color: var(--navy);
    padding: 0.875rem 2rem;
    position: sticky;
    top: 0;
    z-index: 200;
    border-bottom: 1px solid var(--gray-100);
    box-shadow: 0 1px 0 rgba(5,28,44,0.04);
  }
  .header-inner {
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
  }
  .brand-lockup {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    flex-wrap: wrap;
  }
  .brand-name {
    font-size: 0.9375rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--navy);
  }
  .brand-sep {
    color: var(--gray-300);
    font-weight: 300;
    user-select: none;
  }
  .brand-practice {
    font-size: 0.8125rem;
    color: var(--gray-600);
    font-weight: 500;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .header-report {
    font-size: 0.8125rem;
    color: var(--gray-600);
    font-weight: 500;
    display: none;
  }
  @media (min-width: 768px) {
    .header-report { display: block; }
  }
  .lang-toggle {
    background: transparent;
    border: 1px solid var(--gray-100);
    color: var(--navy);
    padding: 0.45rem 1rem;
    font-size: 0.8125rem;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    border-radius: 2px;
    transition: background var(--transition), border-color var(--transition), color var(--transition);
    white-space: nowrap;
  }
  .lang-toggle:hover, .lang-toggle:focus-visible {
    background: var(--gray-50);
    border-color: var(--mck-blue);
    color: var(--mck-blue);
    outline: none;
  }
  /* Hero — McKinsey homepage */
  .hero-mck {
    background: linear-gradient(128deg, #051C2C 0%, #0A2E4A 42%, #103d5a 100%);
    color: var(--white);
    padding: 3.25rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero-mck::before {
    content: "";
    position: absolute;
    top: -40%;
    right: -10%;
    width: 55%;
    height: 140%;
    background: radial-gradient(ellipse, rgba(34,81,255,0.18) 0%, transparent 68%);
    pointer-events: none;
  }
  .hero-mck-grid {
    max-width: var(--max-w);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 2.5rem;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .hero-eyebrow {
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.62);
    font-weight: 600;
    margin-bottom: 0.85rem;
  }
  .hero-title {
    font-size: clamp(2rem, 4.2vw, 3.125rem);
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 1.06;
    color: var(--white);
  }
  .hero-quarter {
    font-size: 1.125rem;
    color: var(--accent);
    font-weight: 500;
    margin-top: 0.65rem;
  }
  .hero-rule {
    width: 52px;
    height: 3px;
    background: var(--mck-blue);
    margin: 1.35rem 0 1.15rem;
  }
  .exec-label {
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 0.65rem;
  }
  .hero-summary {
    font-size: 1.0625rem;
    line-height: 1.75;
    color: rgba(255,255,255,0.9);
    max-width: 52ch;
  }
  .hero-mck-media {
    position: relative;
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 28px 56px rgba(0,0,0,0.38);
    min-height: 300px;
  }
  .hero-img {
    width: 100%;
    height: 100%;
    min-height: 300px;
    object-fit: cover;
    display: block;
  }
  .hero-mck-media::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, rgba(5,28,44,0.35) 0%, transparent 55%);
    pointer-events: none;
  }
  .hero-accent-bar {
    max-width: var(--max-w);
    margin: 2rem auto 0;
    height: 4px;
    background: linear-gradient(90deg, var(--mck-blue) 0%, var(--accent) 100%);
    position: relative;
    z-index: 1;
  }
  /* Main layout */
  .page-shell { background: var(--gray-50); }
  main { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem 2.5rem; }
  /* Navigation */
  .section-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin: 0 -2rem 2rem;
    padding: 0 2rem;
    background: var(--white);
    border-bottom: 1px solid var(--gray-100);
    box-shadow: 0 4px 20px rgba(5,28,44,0.06);
    position: sticky;
    top: 52px;
    z-index: 150;
  }
  .nav-btn {
    flex: 1;
    min-width: 140px;
    padding: 1.05rem 1.25rem;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    font-family: var(--font);
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition), background var(--transition);
    text-align: center;
  }
  .nav-btn:hover { color: var(--navy); background: var(--gray-50); }
  .nav-btn.active {
    color: var(--navy);
    border-bottom-color: var(--mck-blue);
    font-weight: 600;
    background: transparent;
  }
  .sections-container {
    background: var(--white);
    padding: 2rem 2rem 2.5rem;
    box-shadow: 0 1px 3px rgba(5,28,44,0.06);
    position: relative;
    min-height: 400px;
  }
  /* Sections */
  .section-panel {
    display: none;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity var(--transition), transform var(--transition);
  }
  .section-panel.active { display: block; opacity: 1; transform: translateY(0); }
  .section-panel h2 {
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
    padding-bottom: 0.65rem;
    border-bottom: 3px solid var(--mck-blue);
    display: inline-block;
  }
  .section-intro {
    font-size: 1rem;
    color: var(--gray-600);
    margin-bottom: 2rem;
    max-width: 72ch;
    border-bottom: 1px solid var(--gray-100);
    padding-bottom: 1.5rem;
  }
  /* Cards & grids */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .kpi-card {
    background: var(--white);
    padding: 1.25rem 1.5rem;
    border-top: 2px solid var(--navy);
  }
  .kpi-label { font-size: 0.75rem; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
  .kpi-value { font-size: 1.75rem; font-weight: 600; color: var(--navy); line-height: 1.1; }
  .kpi-unit { font-size: 0.875rem; font-weight: 500; color: var(--gray-600); margin-left: 0.15rem; }
  .kpi-deltas { display: flex; flex-wrap: wrap; gap: 0.35rem 0.65rem; margin-top: 0.4rem; }

    background: var(--white);
    color: var(--gray-800);
    font-size: 0.8125rem;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
  }
  .dash-scn.active { background: var(--mck-blue); color: var(--white); border-color: var(--mck-blue); }
  .dash-summary {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .dash-sum-card { background: var(--white); border: 1px solid var(--gray-100); border-radius: 6px; padding: 0.85rem; }
  .dash-sum-label { font-size: 0.6875rem; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.35rem; }
  .dash-sum-val { font-size: 1.15rem; font-weight: 700; color: var(--navy); }
  .dash-sum-val.pos { color: #1F8A4C; }
  .dash-sum-val.neg { color: #C45C4A; }
  .dash-chart-card { margin-bottom: 1.25rem; }
  .dash-chart-card h3 { font-size: 0.9375rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem; }
  .dash-chart-card .chart-wrap { height: 280px; }
  .dash-drivers {
    background: var(--accent-muted);
    border-left: 2px solid var(--accent);
    padding: 0.85rem 1rem;
    border-radius: 0 4px 4px 0;
  }
  .dash-drv-title { font-size: 0.75rem; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
  .dash-drv { display: inline-flex; gap: 0.4rem; margin-right: 1.5rem; font-size: 0.8125rem; color: var(--gray-800); }
  .dash-drv b { color: var(--navy); }
  .dash-disclaimer { font-size: 0.6875rem; color: var(--gray-600); line-height: 1.5; font-style: italic; margin-top: 1rem; }
  @media (max-width: 900px) {
    .dash-grid { grid-template-columns: 1fr; }
    .dash-inputs { position: static; }
    .dash-summary { grid-template-columns: repeat(2, 1fr); }
  }
  .eba-unit {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--gray-600);
    margin: -0.5rem 0 0.75rem;
  }
  .forecast-change {
    display: inline-block;
    font-size: 0.6875rem;
    color: var(--gray-600);
    background: var(--gray-100);
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    margin-top: 0.35rem;
  }
  @media (max-width: 900px) {
    .bucket-grid { grid-template-columns: repeat(2, 1fr); }
    .split-charts, .split-charts.three { grid-template-columns: 1fr; }
    .forecast-grid { grid-template-columns: repeat(2, 1fr); }
    .gdp-bars-only .chart-wrap { height: 520px; }
  }
  @media (max-width: 640px) {
    .forecast-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .bucket-grid { grid-template-columns: 1fr; }
  }
  /* Prev/Next */
  .section-controls {
    display: flex;
    justify-content: space-between;
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--gray-100);
  }
  .ctrl-btn {
    background: var(--navy);
    color: var(--white);
    border: none;
    padding: 0.75rem 1.5rem;
    font-family: var(--font);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 2px;
    transition: background var(--transition);
  }
  .ctrl-btn:hover, .ctrl-btn:focus-visible { background: var(--mck-blue); outline: none; }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ctrl-btn.secondary { background: transparent; color: var(--navy); border: 1px solid var(--gray-100); }
  .ctrl-btn.secondary:hover { background: var(--gray-50); }
  /* Footer */
  .site-footer {
    max-width: var(--max-w);
    margin: 3rem auto 2rem;
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--gray-100);
    font-size: 0.75rem;
    color: var(--gray-600);
    text-align: center;
  }
  .site-footer .footer-confidential {
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 0.7rem;
    margin: 0 0 0.6rem;
  }
  .site-footer .footer-disclaimer {
    font-size: 0.6875rem;
    line-height: 1.6;
    max-width: 62rem;
    margin: 0 auto 0.6rem;
  }
  .site-footer .footer-copy {
    font-size: 0.6875rem;
    color: var(--gray-600);
    margin: 0;
  }
  /* Print */
  @media print {
    .lang-toggle, .section-nav, .section-controls, .nav-btn { display: none !important; }
    .section-panel { display: block !important; opacity: 1 !important; page-break-inside: avoid; margin-bottom: 2rem; }
    .site-header { position: static; }
    .hero-mck { padding: 2rem; break-after: avoid; }
    .hero-mck-media { max-height: 220px; }
    .hero-img { min-height: 220px; }
    body { background: white; }
  }
  @media (max-width: 900px) {
    .hero-mck-grid {
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .hero-mck-media { order: -1; min-height: 220px; }
    .hero-img { min-height: 220px; }
    .gdp-bars-only .chart-wrap { height: 520px; }
    .hero-summary { max-width: none; }
  }
  @media (max-width: 640px) {
    .site-header { padding: 0.75rem 1rem; }
    .hero-mck { padding: 2rem 1rem 2.5rem; }
    main { padding: 0 1rem 1.5rem; }
    .section-nav { margin: 0 -1rem 1.5rem; padding: 0 1rem; top: 48px; }
    .sections-container { padding: 1.25rem 1rem 1.75rem; }
    .header-inner { flex-direction: row; align-items: center; }
    .brand-lockup { flex: 1; min-width: 0; }
    .brand-practice { display: none; }
    .brand-sep { display: none; }
    .header-actions { flex-shrink: 0; }
    .lang-toggle { position: static; }
    .chart-grid { grid-template-columns: 1fr; }
    .eba-grid { grid-template-columns: 1fr; }
    .noi-panel-grid { grid-template-columns: 1fr; }
    .nav-btn { min-width: 100%; font-size: 0.75rem; padding: 0.75rem; }
    /* Dashboard on phones */
    .dash-summary { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .dash-sum-val { font-size: 1rem; }
    .dash-scenarios { gap: 0.35rem; }
    .dash-scn { flex: 1; text-align: center; padding: 0.5rem 0.4rem; }
    .dash-scn-label { flex-basis: 100%; margin-bottom: 0.25rem; }
    .dash-chart-card .chart-wrap { height: 240px; }
    .dash-drv { display: flex; justify-content: space-between; margin-right: 0; width: 100%; }
    /* Market-share exhibits on phones */
    .ms-exhibit { padding: 1rem; }
    .ms-body .chart-wrap { height: 260px; }
    .ms-legend { gap: 0.25rem 1rem; }
    /* Typography scaling */
    .section-panel h2 { font-size: 1.35rem; }
    .macro-bucket-header { flex-wrap: wrap; gap: 0.25rem; }
    .macro-bucket-header h3 { font-size: 1rem; }
    .ms-ex-head .macro-bucket-header h3 { font-size: 1rem; }
  }
  @media (max-width: 420px) {
    .dash-summary { grid-template-columns: 1fr; }
  }
  /* Prevent horizontal overflow on small screens */
  html, body { overflow-x: hidden; }
  canvas { max-width: 100%; }
</style>
</head>

// Clip every dashboard time series to start in 2021 (drops stray 2019/2020 points).
function seriesYear(label) {
  const s = String(label).trim();
  let m = s.match(/^(\d{4})[-\/]/); if (m) return +m[1];
  m = s.match(/(\d{4})$/); if (m) return +m[1];
  m = s.match(/(\d{2})$/); if (m) return 2000 + (+m[1]);
  return 9999;
}
function clipToYear(labels, arrays, minYear) {
  if (!Array.isArray(labels)) return;
  let cut = 0;
  while (cut < labels.length && seriesYear(labels[cut]) < minYear) cut++;
  if (cut <= 0) return;
  labels.splice(0, cut);
  arrays.forEach(a => { if (Array.isArray(a)) a.splice(0, cut); });
}
function clipDashboardTo2021() {
  const MIN = 2021, e = MACRO_EXCEL;
  clipToYear(e.ifo.labels, [e.ifo.climate, e.ifo.currentSit, e.ifo.expectations, e.ifo.mom], MIN);
  clipToYear(e.gfk.labels, [e.gfk.values], MIN);
  clipToYear(e.hde.labels, [e.hde.values], MIN);
  clipToYear(e.labor.labels, [e.labor.unemployedMn, e.labor.unemploymentRate, e.labor.vacancies], MIN);
  clipToYear(e.inflation.labels, [e.inflation.germanyCPI, e.inflation.eurozoneHICP], MIN);
  const p = DATA.performance;
  if (p && p.labels) {
    const arrs = [];
    ['roe', 'nim', 'cir', 'cet1', 'forbearance', 'lcr', 'npl'].forEach(k => { if (p[k]) arrs.push(p[k].de, p[k].at, p[k].eu); });
    clipToYear(p.labels, arrs, MIN);
    if (p.bls && p.bls.labels) {
      const b = p.bls, ba = [];
      ['std', 'dem'].forEach(g => { if (b[g]) Object.keys(b[g]).forEach(sk => ba.push(b[g][sk].de, b[g][sk].ea)); });

    }

}

function drawRoundRect(ctx, x, y, w, h, r) {
  const rad = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  if (typeof ctx.roundRect === 'function') {
    ctx.roundRect(x, y, w, h, rad);
  } else {
    ctx.moveTo(x + rad, y);
    ctx.lineTo(x + w - rad, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rad);
    ctx.lineTo(x + w, y + h - rad);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    ctx.lineTo(x + rad, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rad);
    ctx.lineTo(x, y + rad);
    ctx.quadraticCurveTo(x, y, x + rad, y);
    ctx.closePath();
  }
}

function safeChart(id, fn) {
  try {
    fn();
  } catch (err) {
    console.error('Chart failed:', id, err);
  }
}
function destroyCharts() {

function renderMacroBuckets() {
  const s = t().sections.macro;
  const b = DATA.macro.buckets;
  const deltaClass = (v, invert) => (invert ? v < 0 : v >= 0) ? 'up' : 'down';
  const fmtDelta = (v, u) => {
    const suffix = u === s.deltaPp ? ' ' + s.deltaPp : (u != null ? u : '');
    return `${v > 0 ? '+' : ''}${v}${suffix}`;
  };
  const d3 = (v, u, invert = false) => `<span class="kpi-delta ${deltaClass(v, invert)}"><span class="delta-period">${s.delta3mShort}</span>${fmtDelta(v, u)}</span>`;
  const d5 = (v, u, invert = false) => `<span class="kpi-delta ${deltaClass(v, invert)}"><span class="delta-period">${s.delta5yShort}</span>${fmtDelta(v, u)}</span>`;
  const kpiUnit = (unit) => unit ? `<span class="kpi-unit">${unit.startsWith(' ') ? unit : ' ' + unit}</span>` : '';
  const kpi = (label, value, unit, delta3m, delta5y, u3, u5, invert = false) => {
    const deltas = [delta3m != null ? d3(delta3m, u3, invert) : '', delta5y != null ? d5(delta5y, u5, invert) : ''].filter(Boolean).join('');
    return `
    <div class="bucket-kpi">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${value}${kpiUnit(unit)}</div>
      ${deltas ? `<div class="kpi-deltas">${deltas}</div>` : ''}
    </div>`;
  };
  const impact = (key) => `
    <div class="bucket-impact">
      <div class="bucket-impact-label">${s.bucketImpactLabel}</div>
      <p>${s.bucketImpacts[key]}</p>
    </div>`;
  const card = (name, kpis, key) => `
    <div class="bucket-card">
      <div class="bucket-name">${name}</div>
      <div class="kpi-scope">${s.countryDe}</div>
      ${kpis}
      ${impact(key)}
    </div>`;
  const tr = b.trend;
  const c = b.consumer;
  return `<div class="bucket-grid">
    ${card(s.buckets.business, kpi(s.bucketLabels.ifo, b.business.value, '', b.business.delta3m, b.business.delta5y), 'business')}
    ${card(s.buckets.consumer, kpi(s.bucketLabels.gfk, c.gfk, '', c.gfkDelta3m, c.gfkDelta5y) + kpi(s.bucketLabels.hde, c.hde, '', c.hdeDelta3m, c.hdeDelta5y), 'consumer')}
    ${card(s.buckets.labor, kpi(s.bucketLabels.unemployment, b.labor.unemployment, '%', b.labor.unempDelta3m, b.labor.unempDelta5y, s.deltaPp, s.deltaPp, true) + kpi(s.bucketLabels.vacancies, b.labor.vacancies, ' ' + s.thousand, b.labor.vacDelta3m, b.labor.vacDelta5y, '', ''), 'labor')}
    ${card(s.buckets.trend, kpi(s.bucketLabels.gdpForecast, tr.gdpForecast, '%', tr.gdpForecastDelta3m, null, s.deltaPp, '') + kpi(s.bucketLabels.gdpQoQ, tr.gdpQoQ, '%', tr.gdpQoQDelta3m, tr.gdpQoQDelta5y, s.deltaPp, s.deltaPp) + kpi(s.bucketLabels.inflation, tr.inflation, '%', tr.inflationDelta3m, tr.inflationDelta5y, s.deltaPp, s.deltaPp), 'trend')}
  </div>`;
}

function renderPerformanceBuckets() {
  const s = t().sections.performance;
  const p = DATA.performance;
  const last = (p.labels || []).length - 1;
  const rd = (v, d) => { const f = Math.pow(10, d); return Math.round(v * f) / f; };
  const deltaClass = (v, invert) => (invert ? v < 0 : v >= 0) ? 'up' : 'down';
  const delta = (period, v, invert, d) => `<span class="kpi-delta ${deltaClass(v, invert)}"><span class="delta-period">${period}</span>${v > 0 ? '+' : ''}${rd(v, d)} ${s.deltaPp}</span>`;
  const kpiRow = (label, val, deltas, dec) => `
    <div class="bucket-kpi">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${rd(val, dec)}<span class="kpi-unit"> %</span></div>
      ${deltas.length ? `<div class="kpi-deltas">${deltas.join('')}</div>` : ''}
    </div>`;
  // Quarterly KPI (banking performance card)
  const kpi = (label, arr, invert) => {
    if (!Array.isArray(arr) || last < 0) return '';
    const deltas = [];
    if (last >= 1 && arr[last - 1] != null) deltas.push(delta(s.deltaQoQ, arr[last] - arr[last - 1], invert, 1));
    if (last >= 4 && arr[last - 4] != null) deltas.push(delta(s.deltaYoY, arr[last] - arr[last - 4], invert, 1));
    return kpiRow(label, arr[last], deltas, 1);
  };
  // Monthly margin KPI (volume & margin card)
  const v = p.volume;
  const vlast = (v && v.labels ? v.labels.length : 0) - 1;
  const mkpi = (label, arr) => {
    if (!Array.isArray(arr) || vlast < 0) return '';
    const deltas = [];
    if (vlast >= 3 && arr[vlast - 3] != null) deltas.push(delta(s.delta3m, arr[vlast] - arr[vlast - 3], false, 2));
    if (vlast >= 12 && arr[vlast - 12] != null) deltas.push(delta(s.deltaYoY, arr[vlast] - arr[vlast - 12], false, 2));
    return kpiRow(label, arr[vlast], deltas, 2);
  };
  const impact = key => `
    <div class="bucket-impact">
      <div class="bucket-impact-label">${s.bucketImpactLabel}</div>
      <p>${s.bucketImpacts[key]}</p>
    </div>`;
  const card = (name, body, key) => `
    <div class="bucket-card">
      <div class="bucket-name">${name}</div>
      <div class="kpi-scope">${s.bucketScope}</div>
      ${body}
      ${impact(key)}
    </div>`;
  const m = v && v.margin;
  const volKpis = mkpi(s.marginKpi.mortgage510, m && m.mortgage510)
    + mkpi(s.marginKpi.consumer15, m && m.consumer15)
    + mkpi(s.marginKpi.corporate15, m && m.corporate15);
  const perfKpis = kpi(s.kpiLabels.roe, p.roe && p.roe.de, false)
    + kpi(s.kpiLabels.cir, p.cir && p.cir.de, true)
    + kpi(s.kpiLabels.npl, p.npl && p.npl.de, true);
  // Demand & supply KPIs (latest quarter, net %, DE vs euro area)
  const bls = p.bls;
  const demSeries = bls ? { stdCorp: bls.std.corp, demHouse: bls.dem.house, demCons: bls.dem.cons, demCorp: bls.dem.corp } : {};
  const sgn = x => (x > 0 ? '+' : '') + x;
  const demKpis = (s.demandKpis || []).map(k => {
    const ser = demSeries[k.key];
    if (!ser) return '';
    const de = ser.de[ser.de.length - 1];
    const ea = ser.ea[ser.ea.length - 1];
    return `
    <div class="bucket-kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${sgn(de)}<span class="kpi-unit"> %</span></div>
      <div class="kpi-note">${k.desc} · ${s.bls.euArea} <b>${sgn(ea)}%</b></div>
    </div>`;
  }).join('');
  return `<div class="bucket-grid cols-3">
    ${card(s.subs.volume.title, volKpis || `<div class="placeholder-note">${s.subs.volume.placeholder}</div>`, 'volume')}
    ${card(s.subs.demand.title, demKpis || `<div class="placeholder-note">${s.subs.demand.placeholder}</div>`, 'demand')}
    ${card(s.subs.performance.title, perfKpis, 'performance')}
  </div>`;
}

function oxfordYears(labels) {
  return labels.map(l => {
    const s = String(l);
    if (s === '2021') return 2021;
    if (s === '34' || s === '2034') return 2034;
    if (s === '35' || s === '2035') return 2035;
    return 2000 + parseInt(s, 10);
  });
}

function makeOxfordChart(id, labels, datasets) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const years = oxfordYears(labels);
  const outlookYear = 2026;
  const outlookLabel = t().sections.macro.oxfordOutlook;
  const styled = datasets.map(d => ({
    ...d,
    data: d.data.map((v, i) => ({ x: years[i], y: v })),
    backgroundColor: 'transparent',
    borderWidth: 2,
    tension: 0.3,
    pointRadius: 0,
    pointHoverRadius: 4,
    borderDash: d.borderDash || []
  }));
  chartInstances[id] = new Chart(ctx, {
    type: 'line',
    data: { datasets: styled },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      parsing: false,
      layout: { padding: { top: 8, right: 32, left: 4 } },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { usePointStyle: true, font: { family: 'Segoe UI, system-ui, sans-serif', size: 10 }, padding: 8 }
        }
      },
      scales: {
        x: {
          type: 'linear',
          min: 2021,
          max: 2035,
          grid: { display: false },
          ticks: {
            font: { size: 10 },
            stepSize: 2,
            autoSkip: false,
            callback: v => String(Math.round(v))
          },
          border: { display: false }
        },
        y: { grid: { color: '#E8EAED' }, ticks: { font: { size: 10 } }, border: { display: false } }
      }
    },
    plugins: [{
      id: id + '-outlook',
      beforeDatasetsDraw(chart) {
        const xScale = chart.scales.x;
        const xStart = xScale.getPixelForValue(2025.5);
        const { top, bottom, right } = chart.chartArea;
        const c = chart.ctx;
        c.save();
        c.fillStyle = 'rgba(0, 169, 206, 0.08)';
        c.fillRect(xStart, top, right - xStart, bottom - top);
        c.font = '600 9px Segoe UI, system-ui, sans-serif';
        c.fillStyle = '#00A9CE';
        c.textAlign = 'left';
        c.textBaseline = 'top';
        c.fillText(outlookLabel, xStart + 4, top + 4);
        c.restore();
      }
    }, {
      id: id + '-labels',
      afterDatasetsDraw(chart) {
        const c = chart.ctx;
        const labelYears = [outlookYear, years[years.length - 1]];
        c.save();
        c.font = '600 9px Segoe UI, system-ui, sans-serif';
        c.textBaseline = 'middle';
        chart.data.datasets.forEach((ds, di) => {
          const meta = chart.getDatasetMeta(di);
          labelYears.forEach(yr => {
            const idx = years.indexOf(yr);
            const pt = meta.data[idx];
            const val = ds.data[idx] != null ? ds.data[idx].y : null;
            if (!pt || val == null) return;
            const text = Number.isInteger(val) ? String(val) : val.toFixed(1);
            const x = pt.x + (yr === years[years.length - 1] ? 6 : 0);
            const y = pt.y - 8;
            c.fillStyle = 'rgba(255,255,255,0.85)';
            c.fillRect(x - 1, y - 7, c.measureText(text).width + 4, 14);
            c.fillStyle = ds.borderColor;
            c.textAlign = 'left';
            c.fillText(text, x + 1, y);
          });
        });
        c.restore();
      }
    }]
  });
}

        }
      ]
    },
    options: {

      maintainAspectRatio: false,

      plugins: {
        legend: {
          position: 'bottom',
          labels: { usePointStyle: true, font: { family: 'Segoe UI, system-ui, sans-serif', size: 11 }, padding: 14 }
        },
        tooltip: {
          callbacks: {
            title: (items) => formatInflationLabel(labels[items[0].dataIndex] || ''),
            label: (item) => `${item.dataset.label}: ${item.raw}%`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          title: { display: true, text: s.inflationYearAxis, font: { size: 10, weight: '600' }, color: '#5C6670', padding: { top: 6 } },
          ticks: {
            font: { size: 10 },
            maxTicksLimit: 12,
            autoSkip: true,
            callback: (val, index) => {
              const lbl = labels[index] || String(val);
              return lbl.startsWith('Jan ') ? ('20' + lbl.slice(-2)) : '';
            }
          }
        },
        y: {
          min: yMin,
          max: yMax,
          grid: { color: '#E8EAED' },
          border: { display: false },
          ticks: {
            display: true,
            font: { size: 10 },
            stepSize: yMax <= 6 ? 1 : undefined,
            callback: v => v + '%'
          }
        }
      }
    },
    plugins: [{
      id: id + '-zero',
      beforeDraw(chart) {
        if (yMin >= 0) return;
        const yScale = chart.scales.y;
        const { left, right } = chart.chartArea;
        const y0 = yScale.getPixelForValue(0);
        const c = chart.ctx;
        c.save();
        c.strokeStyle = 'rgba(92,102,112,0.45)';
        c.lineWidth = 1;
        c.setLineDash([4, 4]);
        c.beginPath();
        c.moveTo(left, y0);
        c.lineTo(right, y0);
        c.stroke();
        c.restore();
      }
    }, {
      id: id + '-year-grid',
      beforeDatasetsDraw(chart) {
        const xScale = chart.scales.x;
        const { top, bottom } = chart.chartArea;
        const c = chart.ctx;
        labels.forEach((lbl, i) => {
          if (!lbl.startsWith('Jan ')) return;
          const x = xScale.getPixelForValue(i);
          c.save();
          c.strokeStyle = 'rgba(232,234,237,0.9)';
          c.lineWidth = 1;
          c.beginPath();
          c.moveTo(x, top);
          c.lineTo(x, bottom);
          c.stroke();
          c.restore();
        });
      }
    }, {
      id: id + '-end-labels',
      afterDatasetsDraw(chart) {
        const c = chart.ctx;
        c.save();
        c.font = '600 10px Segoe UI, system-ui, sans-serif';
        chart.data.datasets.slice(0, 2).forEach((ds, di) => {
          const meta = chart.getDatasetMeta(di);
          let lastBar = null;
          let lastVal = null;
          ds.data.forEach((v, i) => {
            if (v != null) { lastBar = meta.data[i]; lastVal = v; }
          });
          if (!lastBar || lastVal == null) return;
          const text = lastVal + '%';
          c.fillStyle = ds.borderColor;
          c.textAlign = 'left';
          c.textBaseline = 'middle';
          c.fillText(text, lastBar.x + 6, lastBar.y);
        });
        c.restore();
      }
    }]
  });
}

function gdpBarColor(name, year) {
  if (name === 'Germany') return year === 2026 ? CHART_COLORS.accent : 'rgba(0,169,206,0.55)';
  if (name === 'Euro area') return year === 2026 ? CHART_COLORS.mckBlue : 'rgba(34,81,255,0.55)';
  return year === 2026 ? CHART_COLORS.navy : 'rgba(5,28,44,0.55)';
}

function isGdpHighlight(name) {
  return name === 'Germany' || name === 'Euro area';
}

function makeGdpEuropeBars(id) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const gdp = DATA.macro.trend.gdpEurope;
  const rows = [...gdp.countries].reverse();
  const labels = rows.map(c => c.name);
  const colors2026 = rows.map(c => gdpBarColor(c.name, 2026));
  const colors2027 = rows.map(c => gdpBarColor(c.name, 2027));
  const xMin = Math.min(-2, ...rows.flatMap(c => [c.y2026, c.y2027].filter(v => v != null)));
  const xMax = Math.max(4, ...rows.flatMap(c => [c.y2026, c.y2027].filter(v => v != null))) + 0.5;
  chartInstances[id] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '2026', data: rows.map(c => c.y2026), backgroundColor: colors2026, barPercentage: 0.82, categoryPercentage: 0.9 },
        { label: '2027', data: rows.map(c => c.y2027), backgroundColor: colors2027, barPercentage: 0.82, categoryPercentage: 0.9 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { right: 32, left: 4 } },
      plugins: {
        legend: { position: 'top', align: 'end', labels: { font: { size: 10 }, usePointStyle: true, boxWidth: 8 } },
        tooltip: { callbacks: { label: item => `${item.dataset.label}: ${item.raw}%` } }
      },
      scales: {
        x: {
          min: xMin,
          max: xMax,
          grid: { color: '#E8EAED' },
          border: { display: false },
          ticks: { font: { size: 10 }, callback: v => v + '%' }
        },
        y: {
          grid: { display: false },
          ticks: {
            font: (c) => ({
              size: isGdpHighlight(labels[c.index]) ? 11 : 10,
              weight: isGdpHighlight(labels[c.index]) ? '700' : '400'
            }),
            color: (c) => isGdpHighlight(labels[c.index]) ? CHART_COLORS.navy : '#5C6670'
          }
        }
      }
    },
    plugins: [{
      id: id + '-labels',
      afterDatasetsDraw(chart) {
        const c = chart.ctx;
        c.save();
        c.font = '600 9px Segoe UI, system-ui, sans-serif';
        chart.data.datasets.forEach((ds, di) => {
          const meta = chart.getDatasetMeta(di);
          meta.data.forEach((bar, i) => {
            const val = ds.data[i];
            if (val == null) return;
            const text = String(val);
            const x = bar.x + (val >= 0 ? 6 : -6);
            c.textAlign = val >= 0 ? 'left' : 'right';
            c.textBaseline = 'middle';
            c.fillStyle = val >= 0 ? '#fff' : CHART_COLORS.navy;
            if (Math.abs(bar.x - chart.scales.x.getPixelForValue(0)) < 10) c.fillStyle = CHART_COLORS.navy;
            c.fillText(text, x, bar.y);
          });
        });
        c.restore();
      }
    }, {
      id: id + '-highlights',
      beforeDatasetsDraw(chart) {
        const yScale = chart.scales.y;
        const { left, right } = chart.chartArea;
        const c = chart.ctx;
        labels.forEach((name, i) => {
          if (!isGdpHighlight(name)) return;
          const y = yScale.getPixelForValue(i);
          const h = yScale.getPixelForValue(i + 0.5) - yScale.getPixelForValue(i - 0.5);
          c.save();
          c.fillStyle = name === 'Germany' ? 'rgba(0,169,206,0.08)' : 'rgba(34,81,255,0.08)';
          c.fillRect(left - 4, y - h / 2, right - left + 8, h);
          c.restore();
        });
      }
    }]
  });
}

  safeChart('chart-mv-margin', () => makeMarginChart('chart-mv-margin'));
  safeChart('chart-mv-volume', () => makeVolumeChart('chart-mv-volume'));
  const b = DATA.performance.bls;
  if (b) {
    safeChart('chart-bls-std-corp', () => makeBlsLineChart('chart-bls-std-corp', b.std.corp.de, b.std.corp.ea));
    safeChart('chart-bls-std-house', () => makeBlsLineChart('chart-bls-std-house', b.std.house.de, b.std.house.ea));
    safeChart('chart-bls-std-cons', () => makeBlsLineChart('chart-bls-std-cons', b.std.cons.de, b.std.cons.ea));
    safeChart('chart-bls-dem-corp', () => makeBlsLineChart('chart-bls-dem-corp', b.dem.corp.de, b.dem.corp.ea));
    safeChart('chart-bls-dem-house', () => makeBlsLineChart('chart-bls-dem-house', b.dem.house.de, b.dem.house.ea));
    safeChart('chart-bls-dem-cons', () => makeBlsLineChart('chart-bls-dem-cons', b.dem.cons.de, b.dem.cons.ea));
  }
  requestAnimationFrame(() => requestAnimationFrame(resizePerformanceCharts));
}

    if (chartInstances[id]) chartInstances[id].resize();

// ===== Banking Dashboard (interactive projection) =====
const DASH_CHART_IDS = ['dash-chart-revcost', 'dash-chart-cir', 'dash-chart-profit'];
const dashState = { scenario: 'baseline', kpis: null };

function dashReadInputs() {
  const k = {};
  DATA.dashboard.kpiOrder.forEach(kk => {
    const el = document.getElementById('dash-in-' + kk);
    const v = el ? parseFloat(el.value) : NaN;
    k[kk] = isNaN(v) ? 0 : v;
  });
  return k;
}

function dashPrefill() {
  const bank = DATA.dashboard.banks[0];
  DATA.dashboard.kpiOrder.forEach(kk => {
    const el = document.getElementById('dash-in-' + kk);
    if (el) el.value = bank.kpis[kk];
  });
  dashState.kpis = Object.assign({}, bank.kpis);
}

function dashCompute(k, scn) {
  const cfg = DATA.dashboard;
  const s = cfg.scenarios[scn] || cfg.scenarios.baseline;
  const years = [];
  for (let y = cfg.startYear; y <= cfg.endYear; y++) years.push(y);
  const out = { years, revenue: [], cost: [], riskCost: [], profit: [], cir: [] };
  let nii = k.revenue * k.niiShare / 100;
  let fee = k.revenue * k.feeShare / 100;
  let other = Math.max(0, k.revenue - nii - fee);
  let loans = k.loans, deposits = k.deposits;
  let personnel = k.cost * k.personnelShare / 100;
  let nonpers = Math.max(0, k.cost - personnel);
  let npl = k.npl;
  const push = (rev, cost, risk) => {
    out.revenue.push(Math.round(rev));
    out.cost.push(Math.round(cost));
    out.riskCost.push(Math.round(risk));
    out.profit.push(Math.round(rev - cost - risk));
    out.cir.push(rev > 0 ? +(cost / rev * 100).toFixed(1) : 0);
  };
  push(k.revenue, k.cost, loans * 1000 * npl / 100 * s.lgd);
  for (let i = 1; i < years.length; i++) {
    const loanGrowth = (s.gdp + s.loanDemand + k.shareDelta / 100) / 100;
    loans = loans * (1 + loanGrowth);
    deposits = deposits * (1 + (s.gdp + s.depositGrowth) / 100);
    nii = nii * (1 + loanGrowth) * (1 + s.nimChange / 100);
    fee = fee * (1 + (s.gdp * s.feeElasticity) / 100);
    other = other * (1 + s.gdp / 100);
    const rev = nii + fee + other;
    personnel = personnel * (1 + s.inflation / 100) * (1 + s.efficiency / 100);
    nonpers = nonpers * (1 + (s.inflation * 0.5) / 100) * (1 + s.efficiency / 100);
    const cost = personnel + nonpers;
    npl = Math.max(0, npl * (1 + s.nplDelta / 100));
    push(rev, cost, loans * 1000 * npl / 100 * s.lgd);
  }
  return out;
}

function dashNum(n) {
  return Math.round(n).toLocaleString(currentLang === 'de' ? 'de-DE' : 'en-US');
}

function dashRenderSummary(proj) {
  const d = t().sections.dashboard;
  const el = document.getElementById('dash-summary');
  if (!el) return;
  const last = proj.years.length - 1;
  const money = d.kpis.revenue.unit;
  const rev = proj.revenue[last], cost = proj.cost[last], profit = proj.profit[last], cir = proj.cir[last];
  const rev0 = proj.revenue[0];
  const cagr = rev0 > 0 ? (Math.pow(rev / rev0, 1 / last) - 1) * 100 : 0;
  const card = (label, val, cls) => `<div class="dash-sum-card"><div class="dash-sum-label">${label}</div><div class="dash-sum-val ${cls || ''}">${val}</div></div>`;
  el.innerHTML =
    card(d.summary.revenue, dashNum(rev) + ' ' + money) +
    card(d.summary.cost, dashNum(cost) + ' ' + money) +
    card(d.summary.profit, dashNum(profit) + ' ' + money, profit >= 0 ? 'pos' : 'neg') +
    card(d.summary.cir, cir.toFixed(1) + ' %') +
    card(d.summary.revCagr, (cagr >= 0 ? '+' : '') + cagr.toFixed(1) + ' %', cagr >= 0 ? 'pos' : 'neg');
}

function dashRenderDrivers() {
  const d = t().sections.dashboard;
  const el = document.getElementById('dash-drivers');
  if (!el) return;
  const s = DATA.dashboard.scenarios[dashState.scenario];
  const pp = v => (v > 0 ? '+' : '') + v + ' %';
  const row = (l, v) => `<div class="dash-drv"><span>${l}</span><b>${v}</b></div>`;
  el.innerHTML = `<div class="dash-drv-title">${d.driversTitle}</div>` +
    row(d.drivers.gdp, pp(s.gdp)) +
    row(d.drivers.inflation, s.inflation + ' %') +
    row(d.drivers.nimChange, pp(s.nimChange)) +
    row(d.drivers.efficiency, pp(s.efficiency)) +
    row(d.drivers.nplDelta, pp(s.nplDelta));
}

function dashDestroy() {
  DASH_CHART_IDS.forEach(id => {
    if (chartInstances[id]) {
      try { chartInstances[id].destroy(); } catch (e) {}
      delete chartInstances[id];
    }
  });
}

function dashUpdate() {
  const d = t().sections.dashboard;
  if (!document.getElementById('dash-chart-revcost')) return;
  const k = dashReadInputs();
  dashState.kpis = k;
  const proj = dashCompute(k, dashState.scenario);
  const labels = proj.years.map(String);
  dashDestroy();
  safeChart('dash-chart-revcost', () => makeLineChart('dash-chart-revcost', labels, [
    { label: d.series.revenue, data: proj.revenue, borderColor: CHART_COLORS.navy, backgroundColor: 'transparent' },
    { label: d.series.cost, data: proj.cost, borderColor: CHART_COLORS.accent, backgroundColor: 'transparent' },
    { label: d.series.riskCost, data: proj.riskCost, borderColor: CHART_COLORS.below, backgroundColor: 'transparent' }
  ]));
  safeChart('dash-chart-cir', () => makeLineChart('dash-chart-cir', labels, [
    { label: d.series.cir, data: proj.cir, borderColor: CHART_COLORS.mckBlue, backgroundColor: 'transparent' }
  ]));
  safeChart('dash-chart-profit', () => makeBarChart('dash-chart-profit', labels, [
    { label: d.series.profit, data: proj.profit, backgroundColor: CHART_COLORS.navy }
  ]));
  dashRenderSummary(proj);
  dashRenderDrivers();
}

function dashSyncScenario() {
  document.querySelectorAll('.dash-scn').forEach(b => b.classList.toggle('active', b.dataset.scn === dashState.scenario));
}

function renderDashboard() {
  if (!document.getElementById('dash-chart-revcost')) return;
  if (dashState.kpis) {
    DATA.dashboard.kpiOrder.forEach(kk => {
      const el = document.getElementById('dash-in-' + kk);
      if (el && dashState.kpis[kk] != null) el.value = dashState.kpis[kk];
    });
  } else {
    dashState.kpis = dashReadInputs();
  }
  const reset = document.getElementById('dash-reset');
  if (reset) reset.onclick = () => { dashPrefill(); dashUpdate(); };
  document.querySelectorAll('.dash-scn').forEach(btn => {
    btn.onclick = () => { dashState.scenario = btn.dataset.scn; dashSyncScenario(); dashUpdate(); };
  });
  DATA.dashboard.kpiOrder.forEach(kk => {
    const el = document.getElementById('dash-in-' + kk);
    if (el) el.oninput = dashUpdate;
  });
  dashSyncScenario();
  dashUpdate();
}

const SECTION_CHART_RENDERERS = {
  macro: renderMacroCharts,
  performance: renderPerformanceCharts,
  industry: renderIndustryCharts,
  banking: renderBankingCharts,
  dashboard: renderDashboard
};

function renderCharts() {
  destroyCharts();
  if (typeof Chart === 'undefined') {
    console.error('Chart.js failed to load — charts require internet access.');
    return;
  }
  const key = sectionKeys[currentSection];
  const render = SECTION_CHART_RENDERERS[key];
  if (render) render();
}

function showSection(idx) {
  currentSection = idx;
  document.querySelectorAll('.section-panel').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.setAttribute('aria-hidden', i !== idx);
  });
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
    btn.setAttribute('aria-selected', i === idx);
  });
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === sectionKeys.length - 1;
  document.getElementById('btn-next').textContent = t().btnNext;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    renderCharts();
    if (sectionKeys[idx] === 'macro') setTimeout(() => renderTrendBottomCharts(), 150);
    if (sectionKeys[idx] === 'performance') setTimeout(() => resizePerformanceCharts(), 150);
    if (sectionKeys[idx] === 'dashboard') setTimeout(() => { DASH_CHART_IDS.forEach(id => { if (chartInstances[id]) chartInstances[id].resize(); }); }, 150);
  }));
}

function renderPage() {
  const c = t();
  document.documentElement.lang = currentLang;
  document.title = `${c.pageTitle} — ${DATA.quarter}`;
  document.getElementById('brand-name').textContent = c.brandName;
  document.getElementById('brand-practice').textContent = c.brandPractice;
  document.getElementById('header-report').textContent = c.headerReport;
  document.getElementById('hero-eyebrow').textContent = c.heroEyebrow;
  document.getElementById('hero-title').textContent = c.pageTitle;
  document.getElementById('hero-quarter').textContent = DATA.quarter;
  document.getElementById('exec-heading').textContent = c.execHeading;
  document.getElementById('exec-text').textContent = c.execSummary;
  document.getElementById('hero-img').alt = c.heroImgAlt;
  document.getElementById('lang-toggle').textContent = c.langToggle;
  document.getElementById('btn-prev').textContent = c.btnPrev;
  document.getElementById('btn-next').textContent = c.btnNext;
  var footEl = document.getElementById('footer-text');
  footEl.innerHTML = '';
  var fParts = [
    ['footer-confidential', c.footerConfidential || c.footer],
    ['footer-disclaimer', c.footerDisclaimer || ''],
    ['footer-copy', c.footerCopyright || '']
  ];
  fParts.forEach(function (p) {
    if (!p[1]) return;
    var el = document.createElement('p');
    el.className = p[0];
    el.textContent = p[1];
    footEl.appendChild(el);
  });

  const nav = document.getElementById('section-nav');
  nav.innerHTML = c.nav.map((label, i) =>
    `<button class="nav-btn${i === currentSection ? ' active' : ''}" role="tab" aria-selected="${i === currentSection}" data-idx="${i}">${label}</button>`
  ).join('');

  const sections = buildSections();
  const container = document.getElementById('sections-container');
  container.innerHTML = sectionKeys.map((key, i) =>
    `<section class="section-panel${i === currentSection ? ' active' : ''}" role="tabpanel" id="panel-${key}" aria-hidden="${i !== currentSection}">${sections[key]}</section>`
  ).join('');

  nav.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => showSection(+btn.dataset.idx));
  });
  showSection(currentSection);
}

document.getElementById('lang-toggle').addEventListener('click', () => {
  currentLang = currentLang === 'de' ? 'en' : 'de';
  localStorage.setItem('gbq-lang', currentLang);
  renderPage();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentSection > 0) showSection(currentSection - 1);
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentSection < sectionKeys.length - 1) showSection(currentSection + 1);
});

renderPage();
</script>
